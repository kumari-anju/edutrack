<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EduTrack - Modern Classroom Management{% endblock %}</title>
    <meta name="description" content="EduTrack - A premium, modern classroom management system for educators.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono&display=swap" rel="stylesheet">
    
    <!-- Bootstrap CSS Baseline -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Studio Chalk Theme -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/studio-chalk.css' %}">
    
    {% block extra_css %}{% endblock %}

</head>
<body class="sc-public-body">
    <nav class="sc-public-nav border-bottom" style="border-color: var(--sc-ink) !important; background-color: var(--sc-paper);">
        <div class="container d-flex justify-content-between align-items-center py-3">
            <a href="{% url 'landing' %}" class="sc-logo-link d-flex align-items-center text-decoration-none">
                <img src="{% static 'images/logo.png' %}" alt="EduTrack Logo" style="height: 40px; width: auto;" class="me-2">
                <span class="fs-4 fw-bold text-dark" style="font-family: var(--sc-font-serif);">EduTrack</span>
            </a>
            <div class="sc-nav-actions">
                {% if user.is_authenticated %}
                    <a href="{% url 'dashboard:index' %}" class="btn btn-outline-dark me-2 sc-btn-secondary">Dashboard</a>
                    <a href="{% url 'accounts:logout' %}" class="btn btn-dark sc-btn-primary">Logout</a>
                {% else %}
                    <a href="{% url 'accounts:login' %}" class="btn btn-outline-dark me-2 sc-btn-secondary">Log In</a>
                    <a href="{% url 'accounts:signup' %}" class="btn btn-dark sc-btn-primary">Sign Up</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="animate-fade-in sc-public-main">
        {% block content %}{% endblock %}
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- EduTrack JS -->
    <script src="{% static 'js/main.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
